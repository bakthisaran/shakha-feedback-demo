<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakha Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }

.card {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
}

select {
  padding:8px;
  margin:8px 8px 16px 0;
}
</style>
</head>

<body>

<h2>Shakha Dashboard</h2>

<!-- Filters -->
<select id="shakhaFilter">
  <option value="Ramakrishna Parivaar Shakha - L SPA">Ramakrishna Parivaar Shakha - L SPA</option>
</select>

<select id="ganaFilter">
  <option value="">All Gana</option>
  <option>Kishore</option>
  <option>Kishori</option>
  <option>Yuva</option>
</select>

<!-- Chart 1 -->
<div class="card">
  <h3>Session Trends</h3>
  <canvas id="trendChart"></canvas>
</div>

<!-- Chart 2 -->
<select id="dateFilter">
  <option value="">Select Date</option>
</select>

<div class="card">
  <h3>Daily Drill-down</h3>
  <div id="details"></div>
</div>

<!-- Insights -->
<div class="card">
  <h3>Comment Insights</h3>
  <div id="insights"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDb4NpYEwtcoY8SgmIHRqAok9qKJF4Ej4k",
  authDomain: "shakha-feedback.firebaseapp.com",
  projectId: "shakha-feedback",
  storageBucket: "shakha-feedback.firebasestorage.app",
  messagingSenderId: "1046199610177",
  appId: "1:1046199610177:web:e85f6418fa9aca5dd44fc0",
  measurementId: "G-PFR8EEQQQF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let trendChart;

// INIT
async function init(){
  const snapshot = await getDocs(collection(db, "feedbacks"));

  snapshot.forEach(doc => {
    allData.push(doc.data());
  });

  populateDates();
  loadChart1();
}

// Populate date dropdown
function populateDates(){
let dates = [...new Set(allData.map(d => d.date))]
  .sort((a, b) => new Date(a) - new Date(b));

  let dropdown = document.getElementById("dateFilter");

  dates.forEach(d => {
    let opt = document.createElement("option");
    opt.value = d;
    opt.text = d;
    dropdown.appendChild(opt);
  });
}
function rollingAverage(arr, windowSize = 3){
  let result = [];

  for(let i = 0; i < arr.length; i++){
    let start = Math.max(0, i - windowSize + 1);
    let subset = arr.slice(start, i + 1);

    let avg = subset.reduce((a,b)=>a + Number(b), 0) / subset.length;
    result.push(avg.toFixed(2));
  }

  return result;
}
// CHART 1 (Trend)
function loadChart1(){

  let gana = document.getElementById("ganaFilter").value;

  let filtered = allData.filter(d => {
    return (!gana || d.gana === gana);
  });

  let grouped = {};

  filtered.forEach(d => {
    let date = d.date;

    if(!grouped[date]){
      grouped[date] = { s:0, b:0, a:0, c:0 };
    }

    grouped[date].s += d.ratings?.shareerik || 0;
    grouped[date].b += d.ratings?.bauddik || 0;
    grouped[date].a += d.ratings?.achar || 0;
    grouped[date].c++;
  });

  let dates = Object.keys(grouped).sort();

  let s = [], b = [], a = [];

  dates.forEach(d => {
    let g = grouped[d];
    s.push((g.s/g.c).toFixed(2));
    b.push((g.b/g.c).toFixed(2));
    a.push((g.a/g.c).toFixed(2));
  });

  if(trendChart) trendChart.destroy();

  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels: dates.map(d => new Date(d).toLocaleDateString()),
      datasets: [
        { label: "Shareerik", data: rollingAverage(s) },
        { label: "Bauddik", data: rollingAverage(b) },
        { label: "Achar", data: rollingAverage(a) }
      ]
    },
    options: {
      scales: { y: { min: 0, max: 5 } }
    }
  });
}

// CHART 2 (Drill-down)
function loadChart2(){

  let date = document.getElementById("dateFilter").value;

  let filtered = allData.filter(d => d.date === date);

  let html = "";

  filtered.forEach(d => {
    html += `
      <div style="border-bottom:1px solid #ddd; padding:10px;">
        <b>Gana:</b> ${d.gana} <br>
        <b>Shareerik:</b> ${d.ratings?.shareerik} |
        <b>Bauddik:</b> ${d.ratings?.bauddik} |
        <b>Achar:</b> ${d.ratings?.achar} <br>

        <i>${d.comments?.Shareerik || ""}</i><br>
        <i>${d.comments?.Bauddik || ""}</i><br>
        <i>${d.comments?.["Achar Paddhati"] || ""}</i><br>

        <b>${d.name || ""}</b>
      </div>
    `;
  });

  document.getElementById("details").innerHTML = html || "No data";

  generateInsights(filtered);
}

// COMMENT INSIGHTS
function generateInsights(data){

  let allComments = [];

  data.forEach(d => {
    if(d.comments){
      Object.values(d.comments).forEach(c => {
        if(c) allComments.push(c.toLowerCase());
      });
    }

    if(d.overallComment){
      allComments.push(d.overallComment.toLowerCase());
    }
  });

  let words = {};
  let positive = [];
  let negative = [];

  const positiveWords = ["good","great","nice","clear","enjoyed","useful","well"];
  const negativeWords = ["bad","slow","boring","unclear","confusing","long","improve"];

  allComments.forEach(comment => {

    comment.split(" ").forEach(w => {
      if(w.length > 3){
        words[w] = (words[w] || 0) + 1;
      }
    });

    if(positiveWords.some(p => comment.includes(p))){
      positive.push(comment);
    }

    if(negativeWords.some(n => comment.includes(n))){
      negative.push(comment);
    }
  });

  let topWords = Object.entries(words)
    .sort((a,b) => b[1]-a[1])
    .slice(0,5);

  let html = `
    <b>Top Keywords:</b><br>
    ${topWords.map(w => `${w[0]} (${w[1]})`).join(", ") || "None"}<br><br>

    <b>👍 Positive Themes:</b><br>
    ${positive.slice(0,3).join("<br>") || "None"}<br><br>

    <b>👎 Improvement Areas:</b><br>
    ${negative.slice(0,3).join("<br>") || "None"}
  `;

  document.getElementById("insights").innerHTML = html;
}

// EVENT LISTENERS (clean approach)
document.getElementById("ganaFilter")
  .addEventListener("change", loadChart1);

document.getElementById("dateFilter")
  .addEventListener("change", loadChart2);

// INIT CALL
init();

</script>

</body>
</html>
