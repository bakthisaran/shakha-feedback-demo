<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>
<p>Ramakrishna Parivaar Shakha - L SPA</p>

<div class="card">
  <canvas id="avgChart"></canvas>
</div>

<script>
  const raw = JSON.parse(localStorage.getItem("shakhaFeedback") || "[]");
  const sessions = ["Shareerik", "Bauddik", "Achar Paddhati"];

  const averages = sessions.map(s => {
    const vals = raw.map(r => r.ratings[s]).filter(Boolean);
    if (vals.length === 0) return 0;
    return (vals.reduce((a,b)=>a+b,0) / vals.length).toFixed(2);
  });

  new Chart(document.getElementById("avgChart"), {
    type: "bar",
    data: {
      labels: sessions,
      datasets: [{
        label: "Average Rating",
        data: averages
      }]
    },
    options: {
      scales: {
        y: { min: 0, max: 5 }
      }
    }
  });
</script>

</body>
</html>
