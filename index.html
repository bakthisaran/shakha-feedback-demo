<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakha Feedback</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:white;
  padding:24px;
  border-radius:16px;
  width:90%;
  max-width:360px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.emojis span {
  font-size:32px;
  margin:10px;
  cursor:pointer;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:12px;
  width:100%;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<div class="card" id="app"></div>

<script>
const SHAKHA_NAME = "Ramakrishna Parivaar Shakha - L SPA";
const SHAKHA_DATE = "27 Mar 2026"; // 👈 change manually

const sessions = ["Shareerik", "Bauddik", "Achar Paddhati"];

let step = -1;
let feedback = {};
let comments = {};
let gana = "";

startScreen();

function header(title){
  return `
    <h3>${SHAKHA_NAME}</h3>
    <p>${SHAKHA_DATE}</p>
    <h2>${title}</h2>
  `;
}

function startScreen(){
  document.getElementById("app").innerHTML = '
    ${header("Shakha Feedback")}
    <button onclick="chooseGana()">Start</button>
  <bR>Will take just a few seconds of your time, we Promise!
  ';
}

function chooseGana(){
  document.getElementById("app").innerHTML = '
    ${header("Select Gana")}
    <select id="gana">
      <option value="">Select</option>
      <option>Kishore</option>
      <option>Kishori</option>
      <option>Yuva</option>
    </select>
    <button onclick="start()">Continue</button>
  ';
}

function start(){
  gana = document.getElementById("gana").value;
  if(!gana){
    alert("Please select Gana");
    return;
  }
  step = 0;
  feedback = {};
  comments = {};
  showSession();
}

function showSession(){
  if(step >= sessions.length){
    showFinal();
    return;
  }

  let session = sessions[step];

  document.getElementById("app").innerHTML = '
    ${header(session)}
    <p>How was this session?</p>
    <div class="emojis">
      <span onclick="rate(1)">😞</span>
      <span onclick="rate(2)">😐</span>
      <span onclick="rate(3)">🙂</span>
      <span onclick="rate(4)">😄</span>
      <span onclick="rate(5)">🤩</span>
    </div>
    <textarea id="comment" placeholder="Optional comment"></textarea>
    <button onclick="next()">Next</button>
  ';
}

function rate(value){
  feedback[sessions[step]] = value;
}

function next(){
  let session = sessions[step];
  comments[session] = document.getElementById("comment").value || "";
  step++;
  showSession();
}

function showFinal(){
  document.getElementById("app").innerHTML = '
    ${header("Final Feedback")}
    <input id="name" placeholder="Your name (optional)" />
    <textarea id="overall" placeholder="Overall comments"></textarea>
    <button onclick="submitFinal()">Submit</button>
  ';
}

function submitFinal(){
  const name = document.getElementById("name").value;
  const overall = document.getElementById("overall").value;

  addDoc(collection(db, "feedbacks"), {
    shakha: SHAKHA_NAME,
    date: SHAKHA_DATE,
    gana: gana,
    ratings: {
      shareerik: feedback["Shareerik"],
      bauddik: feedback["Bauddik"],
      achar: feedback["Achar Paddhati"]
    },
    comments: comments,
    name: name || null,
    overallComment: overall || null,
    source: window.location.search.includes("qr=1") ? "QR" : "Shared",
    timestamp: new Date()
  }).then(() => {
    document.getElementById("app").innerHTML = '
      ${header("🙏 Dhanyavaad!")}
      
    ';
  });
}
</script>

import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  authDomain: "shakha-feedback.firebaseapp.com",
  projectId: "shakha-feedback",
  storageBucket: "shakha-feedback.firebasestorage.app",
  messagingSenderId: "1046199610177",
  appId: "1:1046199610177:web:e85f6418fa9aca5dd44fc0",

};

const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
</script>

</body>
</html>
