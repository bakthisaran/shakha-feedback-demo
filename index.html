<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakha Feedback</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:white;
  padding:24px;
  border-radius:16px;
  width:90%;
  max-width:360px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.emojis span {
  font-size:32px;
  margin:10px;
  cursor:pointer;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:12px;
  width:100%;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<div class="card" id="app"></div>

<script>
const SHAKHA_NAME = "Ramakrishna Parivaar Shakha - L SPA";
const SHAKHA_DATE = "27 Mar 2026"; // 👈 change manually
const APP_VER = "0.6"
const sessions = ["Shareerik", "Bauddik", "Achar Paddhati"];
const GANA_DATA = {
  Kishore: {
    bauddikTitle: "Deep dive in to Classical Dances:Kuchipudi",
    bauddikShikshak: "Keerthi"
  },
  Kishori: {
    bauddikTitle: "Deep dive in to Classical Dances:Kuchipudi",
    bauddikShikshak: "Keerthi Ben"
  },
  Yuva: {
    bauddikTitle: "Charcha on Current Affairs",
    bauddikShikshak: "Ankush Ji"
  }
};
let step = -1;
let feedback = {};
let gana = "";

startScreen();
function header(title){
  return `
    <h3>${SHAKHA_NAME}</h3>
    <h2>Shakha on: ${SHAKHA_DATE}</h2>
    <p>${title}</p>
    
      `;
}

function startScreen(){
  document.getElementById("app").innerHTML = `
    ${header("Feedback")}
    <br>This will be quick, we Promise! :-)<br><br>
    <button onclick="chooseGana()">Start</button>
    <br><p>ver:${APP_VER}</p>
  `;
}
function chooseGana() {
    document.getElementById("app").innerHTML = `
        ${header("Select Gana")}
        <select id="gana">
            <option value="">Select</option>
            <option>Kishore</option>
            <option>Kishori</option>
            <option>Yuva</option>
        </select>
        <button onclick="start()">Continue</button>
    `;
}


function start(){
  gana = document.getElementById("gana").value;
  if(!gana){
    alert("Please select Gana");
    return;
  }
  step = 0;
  feedback = {};
  
  showSession();
}

function showSession(){
  if(step >= sessions.length){
    showFinal();
    return;
  }

  let session = sessions[step];

  let ganaDisplay = "";
  if(session === "Bauddik"){
    ganaDisplay = `
      <p>Gana:<b>${gana}</b></p>
      <p><b>${GANA_DATA[gana].bauddikTitle}</b></p>
      <p>by-${GANA_DATA[gana].bauddikShikshak}</p>
    `;
  } else {
    ganaDisplay = `<p>Gana:<b>${gana}</b></p>`;
  }

  document.getElementById("app").innerHTML = `
    ${header(session)}
    ${ganaDisplay}
    <p>How was this session?</p>

    <div class="emojis">
      <span onclick="rate(1)">😞</span>
      <span onclick="rate(2)">😐</span>
      <span onclick="rate(3)">🙂</span>
      <span onclick="rate(4)">😄</span>
      <span onclick="rate(5)">🤩</span>
    </div>
  `;
}
function rate(value){
  feedback[sessions[step]] = value;
  next();
}

function next(){
  let session = sessions[step];
  
  step++;
  showSession();
}

function showFinal(){
  document.getElementById("app").innerHTML = `
    ${header("Overall comments")}
    <input id="name" placeholder="Your name (optional)" />
    <textarea id="overall" placeholder="Overall comments"></textarea>
    <button onclick="submitFinal()">Submit</button>
  `;
}

function submitFinal(){
  const name = document.getElementById("name").value;
  const overall = document.getElementById("overall").value;

  addDoc(collection(db, "feedbacks"), {
    shakha: SHAKHA_NAME,
    date: SHAKHA_DATE,
    gana: gana,
    bauddikTitle: GANA_DATA[gana].bauddikTitle,
    bauddikShikshak: GANA_DATA[gana].bauddikShikshak,
    ratings: {
      shareerik: feedback["Shareerik"],
      bauddik: feedback["Bauddik"],
      achar: feedback["Achar Paddhati"]
    },
    name: name || null,
    overallComment: overall || null,
    source: window.location.search.includes("qr=1") ? "QR" : "Shared",
    timestamp: new Date()
  }).then(() => {
    console.log("SUCCESS:", docRef.id);
    alert("Saved!");
    document.getElementById("app").innerHTML = `
      ${header("🙏 Dhanyavaad!")}
      We have recorded your feedback.
      <br> You may close this window now.
    `;
  })
  .catch((error) => {
    console.error("FAILED:", error);
    alert(error.message);
  });
}
</script>

</body>
</html>
