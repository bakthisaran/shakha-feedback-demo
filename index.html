<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shakha Feedback</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .emojis span {
      font-size: 32px;
      margin: 10px;
      cursor: pointer;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card" id="app">
  <h3>Ramakrishna Parivaar Shakha - L SPA</h3>
  <p>Today's Shakha Feedback</p>
  <button onclick="start()">Start</button>
</div>

<script>
  const sessions = ["Shareerik", "Bauddik", "Achar Paddhati"];
  let step = -1;
  let feedback = {};

  function start() {
    step = 0;
    feedback = {};
    showSession();
  }

  function showSession() {
    if (step >= sessions.length) {
      showOptional();
      return;
    }

    document.getElementById("app").innerHTML = `
      <h2>${sessions[step]}</h2>
      <p>How was this session?</p>
      <div class="emojis">
        <span onclick="rate(1)">😞</span>
        <span onclick="rate(2)">😐</span>
        <span onclick="rate(3)">🙂</span>
        <span onclick="rate(4)">😄</span>
        <span onclick="rate(5)">🤩</span>
      </div>
    `;
  }

  function rate(value) {
    feedback[sessions[step]] = value;
    step++;
    showSession();
  }

  function showOptional() {
    document.getElementById("app").innerHTML = `
      <h3>Optional</h3>
      <input id="name" placeholder="Your name (optional)" />
      <textarea id="comment" placeholder="Any feedback?"></textarea>
      <button onclick="submitFinal()">Submit</button>
    `;
  }

  function submitFinal() {
    const name = document.getElementById("name").value;
    const comment = document.getElementById("comment").value;

    addDoc(collection(db, "feedbacks"), {
      shakha: "Ramakrishna Parivaar Shakha - L SPA",
      date: new Date().toISOString().split("T")[0],
      shareerik: feedback["Shareerik"],
      bauddik: feedback["Bauddik"],
      achar: feedback["Achar Paddhati"],
      name: name || null,
      comment: comment || null,
      source: window.location.search.includes("qr=1") ? "QR" : "Shared",
      timestamp: new Date()
    }).then(() => {
      document.getElementById("app").innerHTML = `
        <h2>🙏 Dhanyavaad!</h2>
        <p>Feedback recorded</p>
        <button onclick="start()">Next Person</button>
      `;
    }).catch((error) => {
      alert("Error saving feedback: " + error);
    });
  }
</script>

<!-- Firebase (MUST be at bottom) -->

  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDb4NpYEwtcoY8SgmIHRqAok9qKJF4Ej4k",
  authDomain: "shakha-feedback.firebaseapp.com",
  projectId: "shakha-feedback",
  storageBucket: "shakha-feedback.firebasestorage.app",
  messagingSenderId: "1046199610177",
  appId: "1:1046199610177:web:e85f6418fa9aca5dd44fc0",
  measurementId: "G-PFR8EEQQQF"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
</script>

</body>
</html>
